    <header>
      <button id="add-row-before" disabled>+r</button>
      <button id="add-row-after" disabled>r+</button>
      <button id="add-col-before" disabled>+c</button>
      <button id="add-col-after" disabled>c+</button>
      <button id="delete-row" disabled>r-</button>
      <button id="delete-col" disabled>c-</button>
      <button id="merge-button" disabled>m</button>
      <button id="unmerge-button" disabled>u</button>
      <button id="head-switch" disabled>th</button>
      <button id="edit-class" disabled>cl</button>
      <button id="copy-html">cp</button>
    </header>
    <div id="input-container">
      <input id="text-input" type="text" hidden>
